<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a1208" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Pantry</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.5/umd/index.min.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root {
      --bg:        #1a1208;
      --surface:   #251c0e;
      --surface2:  #2f2412;
      --border:    #3d3018;
      --text:      #f0e6d0;
      --muted:     #8a7a60;
      --accent:    #e8a020;
      --accent2:   #c46a10;
      --danger:    #c0392b;
      --warn:      #e67e22;
      --ok:        #27ae60;
      --radius:    14px;
      --font-head: 'DM Serif Display', serif;
      --font-body: 'DM Sans', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-body); overflow: hidden; }

    /* ── Layout ── */
    #app { display: flex; flex-direction: column; height: 100dvh; }

    /* ── Header ── */
    header {
      padding: 16px 20px 12px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }
    header h1 { font-family: var(--font-head); font-size: 1.6rem; letter-spacing: -0.02em; }
    header h1 span { color: var(--accent); font-style: italic; }
    .header-actions { display: flex; gap: 8px; align-items: center; }

    /* ── Drive status dot ── */
    .drive-status {
      font-size: 0.7rem; color: var(--muted); display: flex; align-items: center; gap: 4px;
    }
    .drive-dot {
      width: 7px; height: 7px; border-radius: 50%; background: var(--border);
      transition: background 0.3s;
    }
    .drive-dot.connected { background: var(--ok); }
    .drive-dot.syncing   { background: var(--warn); animation: pulse 1s ease-in-out infinite; }
    .drive-dot.error     { background: var(--danger); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ── Nav tabs ── */
    nav {
      display: flex; background: var(--surface); border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    nav button {
      flex: 1; padding: 12px 8px; background: none; border: none; color: var(--muted);
      font-family: var(--font-body); font-size: 0.75rem; font-weight: 500;
      letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer;
      border-bottom: 2px solid transparent; transition: all 0.2s;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
    }
    nav button .nav-icon { font-size: 1.1rem; }
    nav button.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── Search bar ── */
    .search-bar {
      padding: 10px 16px; background: var(--surface); border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .search-bar input {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 12px; color: var(--text);
      font-family: var(--font-body); font-size: 0.9rem;
      outline: none;
    }
    .search-bar input:focus { border-color: var(--accent); }
    .search-bar input::placeholder { color: var(--muted); }

    /* ── Main scroll area ── */
    main { flex: 1; overflow-y: auto; padding: 16px; }

    /* ── Category group ── */
    .category-group { margin-bottom: 24px; }
    .category-header {
      display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
      font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted);
    }
    .category-header::after { content:''; flex:1; height:1px; background: var(--border); }

    /* ── Item card ── */
    .item-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px; margin-bottom: 8px;
      display: flex; align-items: center; gap: 12px;
      transition: border-color 0.2s;
      position: relative; overflow: hidden;
    }
    .item-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; background: var(--ok);
      transition: background 0.3s;
    }
    .item-card.warn::before { background: var(--warn); }
    .item-card.expired::before { background: var(--danger); }
    .item-card.expired { opacity: 0.75; }

    .item-info { flex: 1; min-width: 0; }
    .item-name { font-weight: 500; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-meta { display: flex; gap: 8px; align-items: center; margin-top: 3px; flex-wrap: wrap; }
    .item-barcode { font-size: 0.7rem; color: var(--muted); font-family: monospace; }
    .item-date { font-size: 0.75rem; padding: 2px 6px; border-radius: 4px; font-weight: 500; }
    .item-date.ok    { background: #1a3d2a; color: #4caf7d; }
    .item-date.warn  { background: #3d2a0a; color: #f0a050; }
    .item-date.expired { background: #3d1010; color: #e07070; }

    .item-actions { display: flex; gap: 6px; }
    .btn-icon {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 6px 8px; cursor: pointer; font-size: 1rem;
      color: var(--text); transition: all 0.15s;
    }
    .btn-icon:active { transform: scale(0.92); background: var(--border); }

    /* ── FAB group ── */
    .fab-group {
      position: fixed; bottom: 24px; right: 20px;
      display: flex; flex-direction: column; align-items: flex-end;
      gap: 10px; z-index: 10;
    }
    .fab {
      background: var(--accent); border: none; border-radius: 50px;
      padding: 14px 22px; font-family: var(--font-body); font-weight: 600;
      font-size: 0.9rem; color: var(--bg); cursor: pointer;
      box-shadow: 0 4px 24px rgba(232,160,32,0.4);
      display: flex; align-items: center; gap: 8px;
      transition: all 0.2s;
    }
    .fab-secondary {
      background: var(--surface2); color: var(--text);
      border: 1px solid var(--border);
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
      font-size: 0.82rem; padding: 11px 18px;
    }
    .fab:active { transform: scale(0.95); }

    /* ── Empty state ── */
    .empty {
      text-align: center; padding: 60px 20px; color: var(--muted);
    }
    .empty .empty-icon { font-size: 3rem; margin-bottom: 16px; }
    .empty p { font-size: 0.9rem; line-height: 1.6; }

    /* ── Modal overlay ── */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.75);
      display: flex; align-items: flex-end; justify-content: center;
      z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.25s;
    }
    .modal-backdrop.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface); border-radius: 20px 20px 0 0;
      width: 100%; max-width: 600px; padding: 24px 20px 40px;
      transform: translateY(30px); transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      max-height: 92dvh; overflow-y: auto;
    }
    .modal-backdrop.open .modal { transform: translateY(0); }
    .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
    .modal h2 { font-family: var(--font-head); font-size: 1.4rem; margin-bottom: 4px; }
    .modal .subtitle { font-size: 0.85rem; color: var(--muted); margin-bottom: 24px; }

    /* ── Scan steps ── */
    .steps { display: flex; gap: 6px; margin-bottom: 24px; }
    .step {
      flex: 1; height: 3px; border-radius: 2px; background: var(--border);
      transition: background 0.3s;
    }
    .step.active { background: var(--accent); }
    .step.done   { background: var(--ok); }

    /* ── Camera viewfinder ── */
    .viewfinder-wrap {
      position: relative; border-radius: 12px; overflow: hidden;
      background: #000; aspect-ratio: 4/3; margin-bottom: 16px;
    }
    .viewfinder-wrap video, .viewfinder-wrap canvas {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .viewfinder-wrap canvas { position: absolute; inset: 0; }
    .scan-overlay {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    .scan-box {
      width: 65%; aspect-ratio: 3/1;
      border: 2px solid var(--accent); border-radius: 8px;
      box-shadow: 0 0 0 2000px rgba(0,0,0,0.45);
      animation: scanpulse 2s ease-in-out infinite;
    }
    .scan-box-date {
      width: 75%; aspect-ratio: 4/1.2;
      border: 2px solid var(--accent); border-radius: 8px;
      box-shadow: 0 0 0 2000px rgba(0,0,0,0.45);
      animation: scanpulse 2s ease-in-out infinite;
    }
    @keyframes scanpulse {
      0%,100% { border-color: var(--accent); box-shadow: 0 0 0 2000px rgba(0,0,0,0.45); }
      50% { border-color: #ffcc60; box-shadow: 0 0 0 2000px rgba(0,0,0,0.35), 0 0 16px rgba(232,160,32,0.4); }
    }
    .scan-hint {
      position: absolute; bottom: 10px; left: 0; right: 0; text-align: center;
      font-size: 0.75rem; color: rgba(255,255,255,0.7); letter-spacing: 0.03em;
    }

    /* ── OCR status ── */
    .ocr-status {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 14px; margin-bottom: 14px;
      font-size: 0.85rem; display: flex; align-items: center; gap: 10px;
    }
    .ocr-status .spinner { animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Form fields ── */
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    .field input, .field select {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; padding: 11px 14px; color: var(--text);
      font-family: var(--font-body); font-size: 0.95rem; outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); }
    .field select option { background: var(--surface); }

    /* ── Buttons ── */
    .btn {
      width: 100%; padding: 14px; border: none; border-radius: 12px;
      font-family: var(--font-body); font-weight: 600; font-size: 0.95rem;
      cursor: pointer; transition: all 0.2s; margin-top: 6px;
    }
    .btn-primary { background: var(--accent); color: var(--bg); }
    .btn-primary:active { background: var(--accent2); }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-danger { background: #3d1010; color: #e07070; border: 1px solid #5a1a1a; }
    .btn:disabled { opacity: 0.4; pointer-events: none; }

    /* ── Result pill ── */
    .result-pill {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px; margin-bottom: 16px;
      display: flex; align-items: center; gap: 12px;
    }
    .result-pill .pill-icon { font-size: 1.5rem; }
    .result-pill .pill-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .result-pill .pill-value { font-weight: 500; margin-top: 2px; }

    /* ── Expired badge ── */
    .expired-banner {
      background: #3d1010; border: 1px solid #5a1a1a; border-radius: 10px;
      padding: 12px 14px; margin-bottom: 16px; font-size: 0.85rem; color: #e07070;
      display: flex; align-items: center; gap: 8px;
    }

    /* ── Item card action reveal ── */
    .item-actions { transition: opacity 0.2s, width 0.2s; opacity: 0; width: 0; overflow: hidden; }
    .item-card.expanded .item-actions { opacity: 1; width: auto; overflow: visible; }
    .item-card { cursor: pointer; }

    /* Sub-row actions (multi-date groups) */
    .subrow-actions { transition: opacity 0.2s, width 0.2s; opacity: 0; width: 0; overflow: hidden; }
    .item-card.expanded .subrow-actions { opacity: 1; width: auto; overflow: visible; }

    /* ── Sign-in banner ── */
    .signin-banner-inner {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; background: #2a1e30; border-bottom: 1px solid #5c3670;
      font-size: 0.82rem; color: #d4a8f0; gap: 8px;
    }
    .signin-banner-inner.error {
      background: #2a1010; border-bottom-color: #6b2020; color: #f0a0a0;
    }

    /* ── Theme swatches ── */
    .theme-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px;
    }
    .theme-swatch {
      border-radius: 10px; padding: 10px 8px; cursor: pointer;
      border: 2px solid transparent; transition: all 0.2s;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      font-size: 0.75rem; font-weight: 500;
    }
    .theme-swatch.active { border-color: white; }
    .theme-swatch .swatch-dot {
      width: 24px; height: 24px; border-radius: 50%;
    }

    /* ── Font size options ── */
    .size-row {
      display: flex; gap: 8px; margin-bottom: 20px;
    }
    .size-btn {
      flex: 1; padding: 10px 4px; border-radius: 10px;
      background: var(--surface2); border: 2px solid var(--border);
      color: var(--text); cursor: pointer; font-family: var(--font-body);
      font-weight: 500; transition: all 0.2s; text-align: center;
    }
    .size-btn.active { border-color: var(--accent); color: var(--accent); }

    /* ── Large tap targets ── */
    body.large-targets .btn-icon { padding: 10px 12px; font-size: 1.2rem; }
    body.large-targets .item-card { padding: 18px 16px; }
    body.large-targets nav button { padding: 16px 8px; }
    body.large-targets .fab { padding: 18px 26px; font-size: 1rem; }
    body.large-targets .fab-secondary { padding: 14px 20px; }

    /* ── Font sizes ── */
    body.font-sm  { font-size: 13px; }
    body.font-md  { font-size: 16px; }
    body.font-lg  { font-size: 19px; }
    body.font-xl  { font-size: 22px; }

    /* ── Drive modal specific ── */
    .drive-info {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px; margin-bottom: 16px;
      font-size: 0.85rem; line-height: 1.6; color: var(--muted);
    }
    .drive-info strong { color: var(--text); }
    .sync-row {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px; margin-bottom: 10px;
    }
    .sync-row-label { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }
    .sync-row-title { font-weight: 500; }
  </style>
</head>
<body>
<div id="app">
  <header>
    <h1>Pan<span>try</span></h1>
    <div class="header-actions">
      <div class="drive-status" id="drive-status" style="display:none">
        <div class="drive-dot" id="drive-dot"></div>
        <span id="drive-status-text">Sync</span>
      </div>
      <button class="btn-icon" id="btn-drive" title="Sync">☁️</button>
      <button class="btn-icon" id="btn-settings" title="Settings">⚙️</button>
      <button class="btn-icon" id="btn-install" style="display:none" title="Install app">⬇️</button>
    </div>
  </header>

  <nav>
    <button class="active" data-tab="pantry">
      <span class="nav-icon">🥫</span> Pantry
    </button>
    <button data-tab="expiring">
      <span class="nav-icon">⏰</span> Expiring
    </button>
    <button data-tab="expired">
      <span class="nav-icon">🚨</span> Expired
    </button>
    <button data-tab="medications">
      <span class="nav-icon">💊</span> Meds
    </button>
  </nav>

  <!-- Sign-in banner — shown when not signed in to sync -->
  <div id="signin-banner" style="display:none">
    <div class="signin-banner-inner" onclick="openDriveModal()" style="cursor:pointer">
      <div>
        <strong>☁️ Sign in to sync</strong>
        <span id="signin-banner-reason"> — tap to back up and restore your pantry across devices</span>
      </div>
      <button class="btn-icon" onclick="event.stopPropagation();closeBanner()" title="Dismiss">✕</button>
    </div>
  </div>

  <div class="search-bar">
    <input type="text" id="search" placeholder="Search items…" autocomplete="off" />
  </div>

  <main id="main-content"></main>

  <div class="fab-group">
    <button class="fab fab-secondary" id="fab-manual">
      <span>✏️</span> Add Manually
    </button>
    <button class="fab" id="fab-scan">
      <span>📷</span> Scan Item
    </button>
  </div>
</div>

<!-- ── Scan Modal ── -->
<div class="modal-backdrop" id="scan-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>Add Item</h2>
    <p class="subtitle" id="modal-subtitle">Step 1 of 3 — Scan the barcode</p>
    <div class="steps">
      <div class="step active" id="step-1"></div>
      <div class="step" id="step-2"></div>
      <div class="step" id="step-3"></div>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<!-- ── Item Detail Modal ── -->
<div class="modal-backdrop" id="detail-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="detail-body"></div>
  </div>
</div>

<!-- ── Settings Modal ── -->
<div class="modal-backdrop" id="settings-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>Settings</h2>
    <p class="subtitle">Appearance and accessibility</p>
    <div id="settings-body"></div>
  </div>
</div>

<!-- ── Sync Modal ── -->
<div class="modal-backdrop" id="drive-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>Sync</h2>
    <p class="subtitle">Encrypted sync across your devices</p>
    <div id="drive-modal-body"></div>
  </div>
</div>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
